  text: |
    How do vProgs scale without L1 bloat Through a decentralized prover market. Execution capacity scales horizontally with the number of off-chain provers, not by burdening L1 nodes. This is permissionless compute, secured by the BlockDAG.
- image: /assets/img/gallery/ceeeca741c6f40c9b83560d1e7cadf62.png
  date: "2026-03-24"
  text: |
    vProgs don't appear overnight. They're built on the Covenants++ foundation. This KIP stack integrates L1 ZK verification and sequencing--the core primitives that transform Kaspa's UTXO model into a fully programmable settlement layer.
    
    https://vprogs.xyz/architecture/covenants/
- image: /assets/img/gallery/f9e91e03722647369fea87f98fae508c.png
  date: "2026-03-24"
  text: |
    KIP 21 proposes an 'Efficient Sequencing Commitment' for vProgs. This is the critical mechanism for ordering state-access operations in a parallelized BlockDAG environment. It's how we solve the concurrent state update problem for scalable smart contracts.
- image: /assets/img/gallery/783fdbfee14e472caca0ed7dbf5ab8f5.png
  date: "2026-03-23"
  text: |
    The doors to DeFi on Kaspa are wide open. A new stablecoin bridge, built using standards from Circle and Tether, is now live on the Kasplex L2. This is a foundational piece for bringing stable liquidity into the ecosystem. The building continues.
- image: /assets/img/gallery/5147758d4d634ab6b57bab82d0e4123d.png
  date: "2026-03-23"
  text: |
    We just crossed a monumental milestone: 1 BILLION transactions processed on the Kaspa network. This isn't a simulation--it's real, growing adoption. Every transaction validates the power of the BlockDAG and the community building with it.
- image: /assets/img/gallery/ef28a8b1be6347e0a9eba35b09a5c1a0.png
  date: "2026-03-23"
  text: |
    vProgs scalability depends on the L1's raw speed. The new Perigee P2P algorithm is showing an ~85.6% avg reduction in block propagation latency in testing. A faster core network means higher potential throughput for verifiable computation.
- image: /assets/img/gallery/1c50c5a5c9134b4499b4fb9626cf5c25.png
  date: "2026-03-23"
  text: |
    People talk about scalability. We show it.
    
    The BlockDAG includes all honest blocks and wastes no PoW. This is what real throughput looks like.
    
    https://blockdag.xyz/architecture/blockdag/
- image: /assets/img/gallery/008f8586abd54a99ba1928dbfcc9a934.png
  date: "2026-03-22"
  text: |
    The next evolution of Kaspa's consensus is taking shape. The `devnet` branch for the DAGKnight protocol upgrade is now live in the rusty-kaspa repo. This is a key milestone towards a more responsive, parameter-less consensus. The work continues.
- image: /assets/img/gallery/ae33a2873626494cbcd4934c69201800.png
  date: "2026-03-22"
  text: |
    vProgs are built on a PoW foundation. This isn't a legacy choice; it's a security one. GhostDAG + kHeavyHash PoW provides permissionless, decentralized block production, ensuring a neutral, censorship-resistant substrate for verifiable computation. No validator cartels.
- image: /assets/img/gallery/871ee4e670834563a256bc6839cad9da.png
  date: "2026-03-21"
  text: |
    Smart contract development is now out of the dark ages. With full Debug Adapter Protocol (DAP) integration, you can set breakpoints and step-through SilverScript code directly in VS Code. This is foundational DevEx for building on the BlockDAG. #vProgs #Kaspa
- image: /assets/img/gallery/21a74e1dea7543439dc534398693b01a.png
  date: "2026-03-20"
  text: |
    Sequential execution is the L1 bottleneck. vProgs on Kaspa's BlockDAG enables parallel processing of smart contracts. Non-conflicting transactions execute concurrently, not in a queue. This unlocks state throughput impossible on a single-chain model. #vProgs #Kaspa
